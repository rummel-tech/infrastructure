name: Deploy Workout Planner Frontend

on:
  repository_dispatch:
    types: [deploy-workout-planner-frontend]
  workflow_dispatch:
    inputs:
      repo_ref:
        description: 'Repository ref to deploy'
        required: false
        default: 'main'
      api_url:
        description: 'Production API URL (leave empty to use default)'
        required: false
        default: ''

permissions:
  contents: read

env:
  # Default production API URL - update when ECS service is deployed
  PRODUCTION_API_URL: ${{ github.event.inputs.api_url || secrets.PRODUCTION_API_URL || 'https://api.workout-planner.rummel.tech' }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout infrastructure repo
        uses: actions/checkout@v4

      - name: Checkout workout-planner repo
        uses: actions/checkout@v4
        with:
          repository: rummel-tech/workout-planner
          token: ${{ secrets.PAT_TOKEN }}
          ref: ${{ github.event.inputs.repo_ref || github.event.client_payload.ref || 'main' }}
          path: app-repo

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true

      - name: Enable Flutter web
        run: flutter config --enable-web

      - name: Configure git for private dependencies
        run: |
          git config --global url."https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Build Workout Planner web
        working-directory: app-repo
        run: |
          echo "Building with API URL: $PRODUCTION_API_URL"
          flutter pub get
          flutter build web --release \
            --base-href /workout-planner/ \
            --dart-define=PRODUCTION_API_URL=$PRODUCTION_API_URL \
            --dart-define=WEB_API_URL=$PRODUCTION_API_URL
          cp build/web/index.html build/web/404.html

      - name: Deploy to workout-planner GitHub Pages
        run: |
          cd app-repo/build/web
          git init
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Deploy frontend from infrastructure workflow"
          git push -f https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/rummel-tech/workout-planner.git HEAD:gh-pages

      - name: Deployment success
        run: |
          echo "============================================================"
          echo "  WORKOUT PLANNER FRONTEND DEPLOYED SUCCESSFULLY"
          echo "============================================================"
          echo ""
          echo "Frontend URL: https://rummel-tech.github.io/workout-planner/"
          echo "API URL: $PRODUCTION_API_URL"
