name: Test Home Manager Backend

on:
  repository_dispatch:
    types: [test-home-manager-backend]
  workflow_dispatch:
    inputs:
      repo_ref:
        description: 'Repository ref to test'
        required: false
        default: 'main'
  push:
    branches: [main]
    paths:
      - 'home-manager/**'
      - 'common/**'
  pull_request:
    branches: [main]
    paths:
      - 'home-manager/**'
      - 'common/**'

permissions:
  contents: read
  pull-requests: write

env:
  PYTHON_VERSION: '3.11'
  SERVICE_NAME: home-manager

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout services repo
        uses: actions/checkout@v4
        with:
          repository: rummel-tech/services
          ref: ${{ github.event.inputs.repo_ref || github.ref }}

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: '${{ env.SERVICE_NAME }}/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./common
          pip install -r ${{ env.SERVICE_NAME }}/requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Create test environment
        working-directory: ${{ env.SERVICE_NAME }}
        run: |
          cat > .env << EOF
          ENVIRONMENT=test
          LOG_LEVEL=warning
          EOF

      - name: Run tests
        working-directory: ${{ env.SERVICE_NAME }}
        run: |
          pytest tests/ \
            --cov=. \
            --cov-report=term \
            --cov-report=xml \
              --cov-fail-under=60 \
            -v \
            --tb=short \
            || echo "No tests found or tests failed"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ env.SERVICE_NAME }}
          path: ${{ env.SERVICE_NAME }}/coverage.xml
          retention-days: 30

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout services repo
        uses: actions/checkout@v4
        with:
          repository: rummel-tech/services
          ref: ${{ github.event.inputs.repo_ref || github.ref }}

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linting tools
        run: pip install flake8 black isort

      - name: Run Black (formatting check)
        working-directory: ${{ env.SERVICE_NAME }}
        run: black --check --diff . || echo "⚠️ Formatting issues found"

      - name: Run isort (import sorting)
        working-directory: ${{ env.SERVICE_NAME }}
        run: isort --check-only --diff . || echo "⚠️ Import sorting issues found"

      - name: Run flake8 (syntax errors)
        working-directory: ${{ env.SERVICE_NAME }}
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics \
            --exclude=.venv,__pycache__,.pytest_cache
