name: Deploy Workout Planner Frontend

on:
  repository_dispatch:
    types: [deploy-workout-planner-frontend]
  workflow_dispatch:
    inputs:
      repo_ref:
        description: 'Repository ref to deploy'
        required: false
        default: 'main'
      api_url:
        description: 'Production API URL (leave empty to use default)'
        required: false
        default: ''

permissions:
  contents: read
  pages: write
  id-token: write

env:
  # Default production API URL - update when ECS service is deployed
  PRODUCTION_API_URL: ${{ github.event.inputs.api_url || secrets.PRODUCTION_API_URL || 'https://api.workout-planner.rummel.tech' }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout infrastructure repo
        uses: actions/checkout@v4

      - name: Checkout workout-planner repo
        uses: actions/checkout@v4
        with:
          repository: rummel-tech/workout-planner
          token: ${{ secrets.PAT_TOKEN }}
          ref: ${{ github.event.inputs.repo_ref || github.event.client_payload.ref || 'main' }}
          path: app-repo

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Enable Flutter web
        run: flutter config --enable-web

      - name: Build Workout Planner web
        working-directory: app-repo
        run: |
          echo "Building with API URL: $PRODUCTION_API_URL"
          flutter pub get
          flutter build web --release \
            --base-href /workout-planner/ \
            --dart-define=PRODUCTION_API_URL=$PRODUCTION_API_URL \
            --dart-define=WEB_API_URL=$PRODUCTION_API_URL
          cp build/web/index.html build/web/404.html

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: app-repo/build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deployment success
        run: |
          echo "============================================================"
          echo "  WORKOUT PLANNER FRONTEND DEPLOYED SUCCESSFULLY"
          echo "============================================================"
          echo ""
          echo "Frontend URL: ${{ steps.deployment.outputs.page_url }}"
          echo "API URL: $PRODUCTION_API_URL"
