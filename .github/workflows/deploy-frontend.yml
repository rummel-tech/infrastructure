name: Deploy Frontend Service

on:
  workflow_call:
    inputs:
      app_name:
        description: 'Application name (e.g., workout-planner)'
        required: true
        type: string
      environment:
        description: 'Target environment (staging or production)'
        required: true
        type: string
      repo_ref:
        description: 'Repository ref to deploy'
        required: false
        type: string
        default: 'main'
      api_url:
        description: 'API URL for the backend'
        required: false
        type: string
        default: ''
      flutter_root:
        description: 'Path to Flutter app root within the repo (default: .)'
        required: false
        type: string
        default: '.'
    secrets:
      PAT_TOKEN:
        required: true
      AWS_ROLE_TO_ASSUME:
        required: true

  workflow_dispatch:
    inputs:
      app_name:
        description: 'Application name'
        required: true
        type: choice
        options:
          - workout-planner
          - meal-planner
          - home-manager
          - vehicle-manager
          - work-planner
          - education-planner
          - content-planner
          - focus-training
          - investment-manager
          - artemis
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - production
      repo_ref:
        description: 'Repository ref to deploy'
        required: false
        default: 'main'
      api_url:
        description: 'API URL override (optional)'
        required: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  FLUTTER_VERSION: '3.27.0'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout infrastructure repo
        uses: actions/checkout@v4

      - name: Checkout app repo
        uses: actions/checkout@v4
        with:
          repository: rummel-tech/${{ inputs.app_name }}
          token: ${{ secrets.PAT_TOKEN }}
          ref: ${{ inputs.repo_ref }}
          path: app-repo

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set environment variables
        id: vars
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "S3_BUCKET=${{ inputs.environment }}-${{ inputs.app_name }}-frontend-${ACCOUNT_ID}" >> $GITHUB_OUTPUT

          # Get CloudFront distribution ID from S3 bucket tags or use env-specific naming
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Comment=='${{ inputs.app_name }} Frontend Distribution (${{ inputs.environment }})'].Id" \
            --output text 2>/dev/null || echo "")
          echo "CLOUDFRONT_DIST_ID=${DIST_ID}" >> $GITHUB_OUTPUT

          # Determine API URL
          if [ -n "${{ inputs.api_url }}" ]; then
            echo "API_URL=${{ inputs.api_url }}" >> $GITHUB_OUTPUT
          else
            # Get ALB DNS name for the environment
            ALB_DNS=$(aws elbv2 describe-load-balancers \
              --names "${{ inputs.environment }}-alb" \
              --query 'LoadBalancers[0].DNSName' \
              --output text 2>/dev/null || echo "")
            if [ -n "$ALB_DNS" ] && [ "$ALB_DNS" != "None" ]; then
              PROTO="https"
              if [ "${{ inputs.environment }}" = "staging" ]; then PROTO="http"; fi
              echo "API_URL=${PROTO}://${ALB_DNS}/api/${{ inputs.app_name }}" >> $GITHUB_OUTPUT
            else
              echo "API_URL=" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Enable Flutter web
        run: flutter config --enable-web

      - name: Get dependencies
        working-directory: app-repo/${{ inputs.flutter_root }}
        run: flutter pub get

      - name: Build Flutter web
        working-directory: app-repo/${{ inputs.flutter_root }}
        run: |
          flutter build web --release \
            --base-href "/" \
            --dart-define=ENVIRONMENT=${{ inputs.environment }} \
            --dart-define=API_URL=${{ steps.vars.outputs.API_URL }}

      - name: Deploy to S3
        run: |
          BUILD_DIR="app-repo/${{ inputs.flutter_root }}/build/web"
          if [ ! -d "$BUILD_DIR" ]; then
            echo "::error::Flutter web build output not found at $BUILD_DIR"
            exit 1
          fi

          # Sync to S3 with appropriate cache headers
          aws s3 sync "$BUILD_DIR" "s3://${{ steps.vars.outputs.S3_BUCKET }}" \
            --delete \
            --cache-control "max-age=31536000,public" \
            --exclude "index.html" \
            --exclude "*.json"

          # Upload index.html and JSON files with no-cache
          aws s3 cp "$BUILD_DIR/index.html" "s3://${{ steps.vars.outputs.S3_BUCKET }}/index.html" \
            --cache-control "no-cache,no-store,must-revalidate"

          # Upload manifest and other JSON files
          find "$BUILD_DIR" -name "*.json" -exec aws s3 cp {} "s3://${{ steps.vars.outputs.S3_BUCKET }}/$(basename {})" \
            --cache-control "no-cache,no-store,must-revalidate" \;

      - name: Invalidate CloudFront cache
        if: steps.vars.outputs.CLOUDFRONT_DIST_ID != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.vars.outputs.CLOUDFRONT_DIST_ID }} \
            --paths "/*"

      - name: Deployment Success
        run: |
          echo "============================================================"
          echo "  ${{ inputs.app_name }} FRONTEND DEPLOYED TO ${{ inputs.environment }}"
          echo "============================================================"
          echo ""
          echo "S3 Bucket: ${{ steps.vars.outputs.S3_BUCKET }}"
          if [ -n "${{ steps.vars.outputs.CLOUDFRONT_DIST_ID }}" ]; then
            echo "CloudFront Distribution: ${{ steps.vars.outputs.CLOUDFRONT_DIST_ID }}"
          fi
          echo "API URL: ${{ steps.vars.outputs.API_URL }}"
          echo ""
          echo "The frontend should be accessible shortly."
