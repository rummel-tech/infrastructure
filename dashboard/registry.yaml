shared_packages:
- name: services-common
  repo: services
  description: FastAPI utilities, auth, logging, metrics, database helpers
  language: python
  version: 0.2.0
  consumers:
  - artemis
  - auth
  - workout-planner
  - meal-planner
  - home-manager
  - vehicle-manager
  - work-planner
  - education-planner
  - content-planner
- name: rummel_blue_theme
  repo: rummel_blue_theme
  description: Unified design system with theme, colors, and assets
  language: dart
  version: 1.0.0
  consumers:
  - infrastructure_dashboard
  - focus_training
  - investment_manager
  - meals_app
  - home_app
  - vehicle_app
  - workout_planner
  - artemis_mobile
  - artemis_work_planner
- name: shared_services
  repo: shared_services
  description: API client, auth, token storage, validation, logging
  language: dart
  version: 0.1.0
  consumers:
  - artemis_mobile
  - meals_app
  - home_app
  - vehicle_app
- name: meals_ui
  repo: meal-planner
  description: Meal planner UI components and screens
  language: dart
  version: 0.0.1
  consumers:
  - meals_app
- name: home_ui
  repo: home-manager
  description: Home manager UI components and screens
  language: dart
  version: 0.0.1
  consumers:
  - home_app
- name: vehicle_ui
  repo: vehicle-manager
  description: Vehicle manager UI components and screens
  language: dart
  version: 0.0.1
  consumers:
  - vehicle_app
infrastructure:
  terraform:
    repo: infrastructure
    modules:
    - ecs-service
    - frontend
    environments:
    - staging
    - production
    resources:
    - VPC
    - ALB
    - ECS Fargate Cluster
    - RDS PostgreSQL 15
    - ECR Repositories
    - S3 + CloudFront (frontends)
    - CloudWatch Logs
    - IAM Roles
    - Security Groups
    - Secrets Manager
  ansible:
    repo: infrastructure
    playbooks:
    - deploy-all
    - rollback
    - run-migrations
    - setup-secrets
    - validate-deployment
  ci_cd:
    total_workflows: 30
    categories:
      deploy_backend: 6
      deploy_frontend: 5
      deploy_other: 3
      test: 4
      security_scan: 6
      ci: 3
      infra: 1
      validate: 2
