---
# Variables common to all environments

aws_region: us-east-1

# Service repository
services_repo: rummel-tech/services
infrastructure_repo: rummel-tech/infrastructure

# Database configuration
db_port: 5432
db_engine: postgres
db_engine_version: "14.7"

# Common tags
common_tags:
  Project: artemis
  ManagedBy: ansible
  Repository: "{{ infrastructure_repo }}"

# Health check settings
health_check_timeout: 10
health_check_retries: 3
health_check_interval: 30

# Deployment settings
deployment_wait_timeout: 600  # 10 minutes
service_stabilization_wait: 120  # 2 minutes

# CloudWatch log settings
log_stream_prefix: ecs
