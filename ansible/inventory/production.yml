---
# Production Environment Inventory

all:
  vars:
    ansible_connection: local
    aws_region: us-east-1
    environment: production

production:
  children:
    ecs_services:
      hosts:
        localhost:
          ansible_connection: local
      vars:
        cluster_name: production-cluster
        services:
          - name: artemis
            port: 8000
            desired_count: 2
            needs_database: false
          - name: home-manager
            port: 8020
            desired_count: 2
            needs_database: true
          - name: vehicle-manager
            port: 8030
            desired_count: 2
            needs_database: true
          - name: meal-planner
            port: 8010
            desired_count: 2
            needs_database: true
          - name: workout-planner
            port: 8040
            desired_count: 2
            needs_database: true

    databases:
      hosts:
        rds:
          ansible_connection: local
      vars:
        db_identifier: production-artemis
        db_instance_class: db.t3.small
        db_name: artemis
        db_username: admin
        db_multi_az: true
        db_backup_retention: 7

    secrets:
      hosts:
        localhost:
          ansible_connection: local
      vars:
        secret_prefix: production
        required_secrets:
          - service: home-manager
            secrets:
              - database_url
          - service: vehicle-manager
            secrets:
              - database_url
          - service: meal-planner
            secrets:
              - database_url
          - service: workout-planner
            secrets:
              - database_url
              - jwt_secret
