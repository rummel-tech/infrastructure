name: Test Workout Planner Backend

on:
  repository_dispatch:
    types: [test-workout-planner-backend]
  workflow_dispatch:
    inputs:
      repo_ref:
        description: 'Repository ref to test'
        required: false
        default: 'main'
  # Trigger on push to main or PR to main
  push:
    branches:
      - main
    paths:
      - 'workout-planner/**'
      - 'common/**'
  pull_request:
    branches:
      - main
    paths:
      - 'workout-planner/**'
      - 'common/**'

permissions:
  contents: read
  pull-requests: write  # For comment on PR with test results

env:
  PYTHON_VERSION: '3.11'
  WORKING_DIR: 'workout-planner'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout services repo
        uses: actions/checkout@v4
        with:
          repository: rummel-tech/services
          ref: ${{ github.event.inputs.repo_ref || github.event.client_payload.ref || github.ref }}
          path: app-repo

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'app-repo/${{ env.WORKING_DIR }}/requirements.txt'

      - name: Install dependencies
        working-directory: app-repo
        run: |
          python -m pip install --upgrade pip
          pip install -e ./common
          pip install -r ${{ env.WORKING_DIR }}/requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Create test environment
        working-directory: app-repo/${{ env.WORKING_DIR }}
        run: |
          # Create minimal .env for testing
          cat > .env << EOF
          DATABASE_URL=sqlite:///test.db
          JWT_SECRET=test-secret-key-for-ci-cd-testing-only
          ENVIRONMENT=test
          EOF

      - name: Run unit tests
        working-directory: app-repo/${{ env.WORKING_DIR }}
        run: |
          pytest tests/ \
            --cov=. \
            --cov-report=term \
            --cov-report=xml \
              --cov-fail-under=60 \
            --cov-report=html \
            -v \
            --tb=short

      - name: Generate coverage badge
        working-directory: app-repo/${{ env.WORKING_DIR }}
        run: |
          coverage_percent=$(python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          coverage = float(root.attrib['line-rate']) * 100
          print(f'{coverage:.0f}')
          ")
          echo "COVERAGE=$coverage_percent" >> $GITHUB_ENV
          echo "Coverage: $coverage_percent%"

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: |
            app-repo/${{ env.WORKING_DIR }}/coverage.xml
            app-repo/${{ env.WORKING_DIR }}/htmlcov/
          retention-days: 30

      - name: Comment PR with test results
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const coverage = process.env.COVERAGE;
            const body = `## 🧪 Test Results

            ✅ All tests passed!

            **Coverage**: ${coverage}%

            <details>
            <summary>View detailed coverage report</summary>

            Coverage reports are available in the build artifacts.
            Download the \`coverage-reports\` artifact to view the HTML report.

            </details>`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Check coverage threshold
        working-directory: app-repo/${{ env.WORKING_DIR }}
        run: |
          COVERAGE=${{ env.COVERAGE }}
          THRESHOLD=55
          echo "Coverage: $COVERAGE%"
          echo "Threshold: $THRESHOLD%"
          if [ "$COVERAGE" -lt "$THRESHOLD" ]; then
            echo "❌ Coverage $COVERAGE% is below threshold $THRESHOLD%"
            exit 1
          else
            echo "✅ Coverage $COVERAGE% meets threshold $THRESHOLD%"
          fi

  integration-tests:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout services repo
        uses: actions/checkout@v4
        with:
          repository: rummel-tech/services
          ref: ${{ github.event.inputs.repo_ref || github.event.client_payload.ref || github.ref }}
          path: app-repo

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'app-repo/${{ env.WORKING_DIR }}/requirements.txt'

      - name: Install dependencies
        working-directory: app-repo
        run: |
          python -m pip install --upgrade pip
          pip install -e ./common
          pip install -r ${{ env.WORKING_DIR }}/requirements.txt
          pip install pytest pytest-asyncio

      - name: Create test environment
        working-directory: app-repo/${{ env.WORKING_DIR }}
        run: |
          cat > .env << EOF
          DATABASE_URL=sqlite:///integration_test.db
          JWT_SECRET=test-secret-key-for-integration-testing
          ENVIRONMENT=test
          EOF

      - name: Run integration tests
        working-directory: app-repo/${{ env.WORKING_DIR }}
        run: |
          pytest tests/test_integration.py -v --tb=short

      - name: Integration test summary
        if: always()
        run: |
          if [ $? -eq 0 ]; then
            echo "✅ Integration tests passed"
          else
            echo "❌ Integration tests failed"
            exit 1
          fi

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout services repo
        uses: actions/checkout@v4
        with:
          repository: rummel-tech/services
          ref: ${{ github.event.inputs.repo_ref || github.event.client_payload.ref || github.ref }}
          path: app-repo

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort mypy

      - name: Run Black (code formatting check)
        working-directory: app-repo/${{ env.WORKING_DIR }}
        run: |
          black --check --diff . || echo "⚠️  Code formatting issues found. Run 'black .' locally."

      - name: Run isort (import sorting check)
        working-directory: app-repo/${{ env.WORKING_DIR }}
        run: |
          isort --check-only --diff . || echo "⚠️  Import sorting issues found. Run 'isort .' locally."

      - name: Run flake8 (style guide enforcement)
        working-directory: app-repo/${{ env.WORKING_DIR }}
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics \
            --exclude=.venv,htmlcov,__pycache__,.pytest_cache
