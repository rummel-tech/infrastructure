app:
  name: meal-planner
  repository: rummel-tech/meal-planner

backend:
  port: 8010
  dockerfile_path: backend/Dockerfile
  working_directory: backend

frontend:
  framework: flutter
  working_directory: frontend/app/meals_app
  base_path: /

aws:
  ecr_repository: meal-planner
  ecs_service: meal-planner-service
  ecs_cluster: app-cluster
  container_name: meal-planner
  region: us-east-1

github:
  pages_enabled: true
  base_url: https://rummel-tech.github.io/meal-planner/
