app:
  name: home-manager
  repository: srummel/home-manager

backend:
  port: 8020
  dockerfile_path: backend/Dockerfile
  working_directory: backend

frontend:
  framework: flutter
  working_directory: frontend/app/home_app
  base_path: /

aws:
  ecr_repository: home-manager
  ecs_service: home-manager-service
  ecs_cluster: app-cluster
  container_name: home-manager
  region: us-east-1

github:
  pages_enabled: true
  base_url: https://srummel.github.io/home-manager/
