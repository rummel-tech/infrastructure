name: Security Scan - Artemis Backend

on:
  repository_dispatch:
    types: [security-scan-artemis]
  workflow_dispatch:
    inputs:
      repo_ref:
        description: 'Repository ref to scan'
        required: false
        default: 'main'
  schedule:
    # Run security scans weekly on Monday at 9 AM UTC
    - cron: '0 9 * * 1'

permissions:
  contents: read
  security-events: write
  pull-requests: write

env:
  PYTHON_VERSION: '3.11'
  APP_NAME: 'artemis'

jobs:
  bandit-scan:
    name: Static Code Analysis (Bandit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout services repo
        uses: actions/checkout@v4
        with:
          repository: rummel-tech/services
          token: ${{ secrets.PAT_TOKEN }}
          ref: ${{ github.event.inputs.repo_ref || github.event.client_payload.ref || github.ref }}

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit security scan
        run: |
          bandit -r ${{ env.APP_NAME }} \
            -x ./.venv,./tests,./htmlcov,__pycache__,.pytest_cache \
            --skip B101 \
            -f json \
            -o bandit-report.json || true

      - name: Generate Bandit summary
        run: |
          python << 'EOF'
          import json
          import os

          with open('bandit-report.json', 'r') as f:
              report = json.load(f)

          results = report.get('results', [])
          high = sum(1 for r in results if r.get('issue_severity') == 'HIGH')
          medium = sum(1 for r in results if r.get('issue_severity') == 'MEDIUM')
          low = sum(1 for r in results if r.get('issue_severity') == 'LOW')

          print(f"Bandit Security Scan Results for Artemis:")
          print(f"  High:   {high}")
          print(f"  Medium: {medium}")
          print(f"  Low:    {low}")
          print(f"  Total:  {len(results)}")

          with open(os.environ['GITHUB_ENV'], 'a') as env:
              env.write(f"BANDIT_HIGH={high}\n")
              env.write(f"BANDIT_MEDIUM={medium}\n")
              env.write(f"BANDIT_LOW={low}\n")
              env.write(f"BANDIT_TOTAL={len(results)}\n")

          if high > 0:
              print("❌ High severity issues found!")
              exit(1)
          else:
              print("✅ No high severity issues found")
          EOF

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-artemis
          path: bandit-report.json
          retention-days: 30

  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout services repo
        uses: actions/checkout@v4
        with:
          repository: rummel-tech/services
          token: ${{ secrets.PAT_TOKEN }}
          ref: ${{ github.event.inputs.repo_ref || github.event.client_payload.ref || github.ref }}

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies and pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip install -r ${{ env.APP_NAME }}/requirements.txt || true

      - name: Run pip-audit
        run: |
          pip-audit --format json --output pip-audit-report.json || true

      - name: Analyze pip-audit results
        run: |
          python << 'EOF'
          import json

          try:
              with open('pip-audit-report.json', 'r') as f:
                  report = json.load(f)

              vulns = len(report) if isinstance(report, list) else 0

              print(f"Dependency Scan Results for Artemis:")
              print(f"  Vulnerabilities: {vulns}")

              if vulns > 0:
                  print(f"⚠️ Vulnerabilities found (review required)")
                  for vuln in report[:5]:  # Show first 5
                      print(f"  - {vuln.get('name', 'Unknown')}: {vuln.get('description', 'No description')}")
              else:
                  print(f"✅ No vulnerabilities found")
          except (FileNotFoundError, json.JSONDecodeError):
              print(f"⚠️ Could not parse report")
          EOF

      - name: Upload pip-audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-artemis
          path: pip-audit-report.json
          retention-days: 30

  docker-scan:
    name: Docker Image Scan (Trivy)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout services repo
        uses: actions/checkout@v4
        with:
          repository: rummel-tech/services
          token: ${{ secrets.PAT_TOKEN }}
          ref: ${{ github.event.inputs.repo_ref || github.event.client_payload.ref || github.ref }}

      - name: Build Docker image
        run: |
          docker build -f ${{ env.APP_NAME }}/Dockerfile -t artemis:scan .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'artemis:scan'
          format: 'json'
          output: 'trivy-report.json'
          severity: 'CRITICAL,HIGH'

      - name: Analyze Trivy results
        run: |
          python << 'EOF'
          import json

          try:
              with open('trivy-report.json', 'r') as f:
                  report = json.load(f)

              results = report.get('Results', [])
              total_vulns = sum(len(r.get('Vulnerabilities', [])) for r in results)

              print(f"Trivy Scan Results for Artemis:")
              print(f"  Total Vulnerabilities: {total_vulns}")

              if total_vulns > 0:
                  print(f"⚠️ Docker image vulnerabilities found")
              else:
                  print(f"✅ No critical/high vulnerabilities in Docker image")
          except (FileNotFoundError, json.JSONDecodeError):
              print(f"⚠️ Could not parse Trivy report")
          EOF

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-artemis
          path: trivy-report.json
          retention-days: 30

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [bandit-scan, dependency-scan, docker-scan]
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: reports/

      - name: Generate consolidated summary
        run: |
          echo "# 🔒 Artemis Security Scan Summary"
          echo ""
          echo "| Check | Status |"
          echo "|-------|--------|"

          if [ -f reports/bandit-artemis/bandit-report.json ]; then
            echo "| Static Analysis (Bandit) | ✅ Complete |"
          else
            echo "| Static Analysis (Bandit) | ⚠️ No Report |"
          fi

          if [ -f reports/pip-audit-artemis/pip-audit-report.json ]; then
            echo "| Dependency Scan (pip-audit) | ✅ Complete |"
          else
            echo "| Dependency Scan (pip-audit) | ⚠️ No Report |"
          fi

          if [ -f reports/trivy-artemis/trivy-report.json ]; then
            echo "| Docker Scan (Trivy) | ✅ Complete |"
          else
            echo "| Docker Scan (Trivy) | ⚠️ No Report |"
          fi
