name: Deploy Workout Planner Frontend

on:
  repository_dispatch:
    types: [deploy-workout-planner-frontend]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - production
        default: 'staging'
      repo_ref:
        description: 'Repository ref to deploy'
        required: false
        default: 'main'
      api_url:
        description: 'API URL override (optional)'
        required: false

jobs:
  deploy-staging:
    if: github.event.inputs.environment == 'staging' || github.event_name == 'repository_dispatch'
    uses: ./.github/workflows/deploy-frontend.yml
    with:
      app_name: workout-planner
      environment: staging
      repo_ref: ${{ github.event.inputs.repo_ref || github.event.client_payload.ref || 'main' }}
      api_url: ${{ github.event.inputs.api_url || '' }}
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}

  deploy-production:
    if: github.event.inputs.environment == 'production'
    uses: ./.github/workflows/deploy-frontend.yml
    with:
      app_name: workout-planner
      environment: production
      repo_ref: ${{ github.event.inputs.repo_ref || 'main' }}
      api_url: ${{ github.event.inputs.api_url || '' }}
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
