app:
  name: vehicle-manager
  repository: rummel-tech/vehicle-manager

backend:
  port: 8030
  dockerfile_path: backend/Dockerfile
  working_directory: backend

frontend:
  framework: flutter
  working_directory: frontend/app/vehicle_app
  base_path: /

aws:
  ecr_repository: vehicle-manager
  ecs_service: vehicle-manager-service
  ecs_cluster: app-cluster
  container_name: vehicle-manager
  region: us-east-1

github:
  pages_enabled: true
  base_url: https://rummel-tech.github.io/vehicle-manager/
