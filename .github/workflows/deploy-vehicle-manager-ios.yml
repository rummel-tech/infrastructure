name: Deploy Vehicle Manager iOS

on:
  repository_dispatch:
    types: [deploy-vehicle-manager-ios]
  workflow_dispatch:
    inputs:
      repo_ref:
        description: 'Repository ref to deploy'
        required: false
        default: 'main'
      deploy_target:
        description: 'Deployment target (testflight or artifact)'
        required: false
        default: 'artifact'
        type: choice
        options:
          - artifact
          - testflight

permissions:
  contents: read
  id-token: write

jobs:
  build-ios:
    runs-on: macos-latest
    env:
      APP_REF: ${{ github.event.inputs.repo_ref || github.event.client_payload.ref || 'main' }}
    steps:
      - name: Checkout infrastructure repo
        uses: actions/checkout@v4

      - name: Checkout vehicle-manager repo
        uses: actions/checkout@v4
        with:
          repository: rummel-tech/vehicle-manager
          ref: ${{ env.APP_REF }}
          path: app-repo

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Set up Ruby + Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: app-repo/frontend/app/vehicle_app

      - name: Install Flutter dependencies
        working-directory: app-repo/frontend/app/vehicle_app
        run: flutter pub get

      - name: Build Flutter iOS (no codesign — artifact path)
        if: ${{ github.event.inputs.deploy_target != 'testflight' }}
        working-directory: app-repo/frontend/app/vehicle_app
        run: flutter build ios --release --no-codesign

      - name: Build and upload to TestFlight via Fastlane
        if: ${{ github.event.inputs.deploy_target == 'testflight' }}
        working-directory: app-repo/frontend/app/vehicle_app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_TEAM_ID: ${{ secrets.APP_STORE_CONNECT_TEAM_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          PROVISIONING_PROFILE_NAME: ${{ secrets.VEHICLE_MANAGER_PROVISIONING_PROFILE_NAME }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: bundle exec fastlane beta

      - name: Upload build artifacts
        if: ${{ github.event.inputs.deploy_target != 'testflight' }}
        uses: actions/upload-artifact@v4
        with:
          name: vehicle-manager-ios-build-${{ env.APP_REF }}
          path: app-repo/frontend/app/vehicle_app/build/ios/iphoneos/Runner.app
          retention-days: 30

      - name: Build summary
        run: |
          if [[ "${{ github.event.inputs.deploy_target }}" == "testflight" ]]; then
            echo "Deployed vehicle-manager@${{ env.APP_REF }} to TestFlight"
          else
            echo "vehicle-manager@${{ env.APP_REF }} build artifact uploaded"
          fi
