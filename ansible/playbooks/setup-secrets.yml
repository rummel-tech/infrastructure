---
# Setup AWS Secrets Manager secrets for services
# Usage: ansible-playbook -i inventory/staging.yml playbooks/setup-secrets.yml

- name: Setup AWS Secrets Manager Secrets
  hosts: secrets
  gather_facts: no

  vars_prompt:
    - name: db_password
      prompt: "Enter database password"
      private: yes
      confirm: yes

    - name: jwt_secret
      prompt: "Enter JWT secret (leave blank to auto-generate)"
      private: yes
      default: ""

  tasks:
    - name: Generate JWT secret if not provided
      set_fact:
        jwt_secret: "{{ lookup('password', '/dev/null length=64 chars=ascii_letters,digits') }}"
      when: jwt_secret == ""

    - name: Get RDS endpoint from Terraform
      shell: |
        cd ../../terraform
        terraform output -raw db_endpoint || echo ""
      register: tf_db_endpoint
      changed_when: false
      failed_when: false

    - name: Set database endpoint
      set_fact:
        db_endpoint: "{{ tf_db_endpoint.stdout if tf_db_endpoint.stdout != '' else 'localhost' }}"

    - name: Construct database URL
      set_fact:
        database_url: "postgresql://{{ hostvars['rds'].db_username }}:{{ db_password }}@{{ db_endpoint }}:{{ db_port }}/{{ hostvars['rds'].db_name }}"

    - name: Display database URL (masked)
      debug:
        msg: "Database URL: postgresql://{{ hostvars['rds'].db_username }}:***@{{ db_endpoint }}:{{ db_port }}/{{ hostvars['rds'].db_name }}"

    - name: Create/Update database_url secrets for services
      amazon.aws.secretsmanager_secret:
        name: "{{ secret_prefix }}/{{ item.service }}/database_url"
        secret: "{{ database_url }}"
        region: "{{ aws_region }}"
        state: present
      loop: "{{ required_secrets | selectattr('secrets', 'contains', 'database_url') | list }}"
      when: "'database_url' in item.secrets"

    - name: Create/Update JWT secret for workout-planner
      amazon.aws.secretsmanager_secret:
        name: "{{ secret_prefix }}/workout-planner/jwt_secret"
        secret: "{{ jwt_secret }}"
        region: "{{ aws_region }}"
        state: present

    - name: List created secrets
      debug:
        msg: "Created secret: {{ secret_prefix }}/{{ item.service }}/{{ secret_item }}"
      loop: "{{ required_secrets | subelements('secrets') }}"
      loop_control:
        loop_var: item
        label: "{{ item.0.service }}"
      vars:
        secret_item: "{{ item.1 }}"

    - name: Summary
      debug:
        msg: |
          ================================================================
          Secrets Setup Complete for {{ environment }} environment
          ================================================================

          Created secrets:
          {% for svc in required_secrets %}
          {% for secret in svc.secrets %}
          - {{ secret_prefix }}/{{ svc.service }}/{{ secret }}
          {% endfor %}
          {% endfor %}

          Database endpoint: {{ db_endpoint }}

          To view a secret:
            aws secretsmanager get-secret-value \
              --secret-id {{ secret_prefix }}/<service>/<secret> \
              --region {{ aws_region }}
