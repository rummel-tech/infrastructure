name: Deploy Workout Planner Backend

on:
  repository_dispatch:
    types: [deploy-workout-planner-backend]
  workflow_dispatch:
    inputs:
      repo_ref:
        description: 'Repository ref to deploy'
        required: false
        default: 'main'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: workout-planner
  ECS_SERVICE: workout-planner-service
  ECS_CLUSTER: app-cluster
  CONTAINER_NAME: workout-planner

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout infrastructure repo
        uses: actions/checkout@v4

      - name: Checkout services repo
        uses: actions/checkout@v4
        with:
          repository: rummel-tech/services
          ref: ${{ github.event.inputs.repo_ref || github.event.client_payload.ref || 'main' }}
          path: services-repo

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names $ECR_REPOSITORY --region $AWS_REGION >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name $ECR_REPOSITORY --image-scanning-configuration scanOnPush=true --region $AWS_REGION

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        working-directory: services-repo
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Build using the Dockerfile at the services repo root
          # which expects common/ and workout-planner/ directories
          docker build -f workout-planner/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Update task definition
        id: task-def
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Get AWS account ID
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

          # Update task definition with actual values
          sed "s/{ACCOUNT_ID}/$ACCOUNT_ID/g; s|{ECR_REGISTRY}|$ECR_REGISTRY|g" \
            aws/ecs-task-definitions/workout-planner.json > /tmp/task-def.json

          # Update image to use specific tag instead of :latest
          jq --arg IMAGE "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            '.containerDefinitions[0].image = $IMAGE' \
            /tmp/task-def.json > /tmp/task-def-final.json

          # Register new task definition
          aws ecs register-task-definition \
            --cli-input-json file:///tmp/task-def-final.json \
            --region $AWS_REGION

      - name: Deploy to ECS
        run: |
          # Check if service exists
          SERVICE_EXISTS=$(aws ecs describe-services \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --region $AWS_REGION \
            --query 'services[0].status' \
            --output text 2>/dev/null || echo "")

          if [ "$SERVICE_EXISTS" == "ACTIVE" ]; then
            echo "Service exists, updating..."
            aws ecs update-service \
              --cluster $ECS_CLUSTER \
              --service $ECS_SERVICE \
              --task-definition workout-planner \
              --force-new-deployment \
              --region $AWS_REGION

            echo "Waiting for service to stabilize..."
            aws ecs wait services-stable \
              --cluster $ECS_CLUSTER \
              --services $ECS_SERVICE \
              --region $AWS_REGION
          else
            echo "ECS service does not exist yet."
            echo "Run the create-ecs-service.sh script to create it first."
            echo "Then re-run this deployment."
            exit 1
          fi

      - name: Deployment Success
        run: |
          echo "============================================================"
          echo "  WORKOUT PLANNER BACKEND DEPLOYED SUCCESSFULLY"
          echo "============================================================"
          echo ""
          echo "Image: ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:${{ github.sha }}"
          echo "Service: $ECS_SERVICE"
          echo "Cluster: $ECS_CLUSTER"
          echo ""
          echo "View logs:"
          echo "   aws logs tail /ecs/workout-planner --follow --region $AWS_REGION"
          echo ""
          echo "Check service status:"
          echo "   aws ecs describe-services --cluster $ECS_CLUSTER --services $ECS_SERVICE --region $AWS_REGION"
