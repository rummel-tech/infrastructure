name: Terraform Apply

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - production
      action:
        description: 'Terraform action'
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
        default: 'plan'
      auto_approve:
        description: 'Auto-approve apply (use with caution)'
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: us-east-1
  TF_VERSION: '1.6.0'

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Ensure Terraform state infrastructure exists
        run: |
          # Check if state bucket exists, create if not
          if ! aws s3api head-bucket --bucket artemis-terraform-state 2>/dev/null; then
            echo "Creating Terraform state bucket..."
            aws s3api create-bucket \
              --bucket artemis-terraform-state \
              --region $AWS_REGION

            aws s3api put-bucket-versioning \
              --bucket artemis-terraform-state \
              --versioning-configuration Status=Enabled

            aws s3api put-bucket-encryption \
              --bucket artemis-terraform-state \
              --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
          fi

          # Check if DynamoDB lock table exists, create if not
          if ! aws dynamodb describe-table --table-name artemis-terraform-locks 2>/dev/null; then
            echo "Creating Terraform lock table..."
            aws dynamodb create-table \
              --table-name artemis-terraform-locks \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region $AWS_REGION

            aws dynamodb wait table-exists --table-name artemis-terraform-locks
          fi

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="environments/${{ inputs.environment }}.backend.hcl"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file="environments/${{ inputs.environment }}.tfvars" \
            -out=tfplan \
            -detailed-exitcode || exit_code=$?

          if [ "$exit_code" == "2" ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Terraform Apply
        if: inputs.action == 'apply' && (inputs.auto_approve || steps.plan.outputs.changes == 'true')
        run: |
          if [ "${{ inputs.auto_approve }}" == "true" ]; then
            terraform apply -auto-approve tfplan
          else
            echo "::warning::Plan shows changes. Run with auto_approve=true to apply."
            terraform show tfplan
          fi

      - name: Terraform Destroy
        if: inputs.action == 'destroy' && inputs.auto_approve
        run: |
          terraform destroy \
            -var-file="environments/${{ inputs.environment }}.tfvars" \
            -auto-approve

      - name: Terraform Output
        if: inputs.action == 'apply' && inputs.auto_approve
        run: terraform output -json > /tmp/outputs.json

      - name: Display Outputs
        if: inputs.action == 'apply' && inputs.auto_approve
        run: |
          echo "============================================================"
          echo "  TERRAFORM APPLY COMPLETE - ${{ inputs.environment }}"
          echo "============================================================"
          echo ""
          cat /tmp/outputs.json | jq -r '.deployment_summary.value | to_entries[] | "\(.key): \(.value)"'
