name: Deploy Workout Planner iOS

on:
  repository_dispatch:
    types: [deploy-workout-planner-ios]
  workflow_dispatch:
    inputs:
      repo_ref:
        description: 'Repository ref to deploy'
        required: false
        default: 'main'
      deploy_target:
        description: 'Deployment target (testflight or artifact)'
        required: false
        default: 'artifact'
        type: choice
        options:
          - artifact
          - testflight

permissions:
  contents: read
  id-token: write

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout infrastructure repo
        uses: actions/checkout@v4

      - name: Checkout workout-planner repo
        uses: actions/checkout@v4
        with:
          repository: srummel/workout-planner
          ref: ${{ github.event.inputs.repo_ref || github.event.client_payload.ref || 'main' }}
          path: app-repo

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.1'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        working-directory: app-repo/applications/frontend/apps/mobile_app
        run: flutter pub get

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      # If deploying to TestFlight, we need certificates and provisioning profiles
      - name: Setup iOS certificates (TestFlight)
        if: ${{ github.event.inputs.deploy_target == 'testflight' }}
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          echo -n "$IOS_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          security import $CERTIFICATE_PATH -P "$IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Install provisioning profile
          PROVISIONING_PROFILE_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          echo -n "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PROVISIONING_PROFILE_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PROVISIONING_PROFILE_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      - name: Build iOS app (Release)
        working-directory: app-repo/applications/frontend/apps/mobile_app
        run: |
          flutter build ios --release --no-codesign

      - name: Build iOS IPA (for TestFlight)
        if: ${{ github.event.inputs.deploy_target == 'testflight' }}
        working-directory: app-repo/applications/frontend/apps/mobile_app
        run: |
          cd ios
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath $RUNNER_TEMP/workout-planner.xcarchive \
            archive

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/workout-planner.xcarchive \
            -exportPath $RUNNER_TEMP \
            -exportOptionsPlist exportOptions.plist

      - name: Upload to TestFlight
        if: ${{ github.event.inputs.deploy_target == 'testflight' }}
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file $RUNNER_TEMP/WorkoutPlanner.ipa \
            --apiKey $APP_STORE_CONNECT_API_KEY_ID \
            --apiIssuer $APP_STORE_CONNECT_API_ISSUER_ID

      - name: Upload build artifacts
        if: ${{ github.event.inputs.deploy_target == 'artifact' || github.event.inputs.deploy_target == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: workout-planner-ios-build
          path: |
            app-repo/applications/frontend/apps/mobile_app/build/ios/iphoneos/Runner.app
          retention-days: 30

      - name: Cleanup keychain (TestFlight)
        if: ${{ always() && github.event.inputs.deploy_target == 'testflight' }}
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true

      - name: Build success
        run: |
          echo "✅ Workout Planner iOS app built successfully!"
          if [[ "${{ github.event.inputs.deploy_target }}" == "testflight" ]]; then
            echo "🚀 Deployed to TestFlight"
          else
            echo "📦 Build artifacts uploaded"
          fi
