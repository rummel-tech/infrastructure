name: Deploy Backend Service

on:
  workflow_call:
    inputs:
      app_name:
        description: 'Application name (e.g., workout-planner)'
        required: true
        type: string
      environment:
        description: 'Target environment (staging or production)'
        required: true
        type: string
      repo_ref:
        description: 'Repository ref to deploy'
        required: false
        type: string
        default: 'main'
      port:
        description: 'Application port'
        required: true
        type: number
    secrets:
      PAT_TOKEN:
        required: true
      AWS_ROLE_TO_ASSUME:
        required: true

  workflow_dispatch:
    inputs:
      app_name:
        description: 'Application name'
        required: true
        type: choice
        options:
          - auth
          - artemis
          - workout-planner
          - meal-planner
          - home-manager
          - vehicle-manager
          - work-planner
          - education-planner
          - content-planner
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - production
      repo_ref:
        description: 'Repository ref to deploy'
        required: false
        default: 'main'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout infrastructure repo
        uses: actions/checkout@v4

      - name: Checkout services repo
        uses: actions/checkout@v4
        with:
          repository: rummel-tech/services
          token: ${{ secrets.PAT_TOKEN }}
          ref: ${{ inputs.repo_ref }}
          path: services-repo

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set environment variables
        run: |
          echo "ECR_REPOSITORY=${{ inputs.environment }}-${{ inputs.app_name }}" >> $GITHUB_ENV
          echo "ECS_SERVICE=${{ inputs.environment }}-${{ inputs.app_name }}-service" >> $GITHUB_ENV
          echo "ECS_CLUSTER=${{ inputs.environment }}-cluster" >> $GITHUB_ENV
          echo "CONTAINER_NAME=${{ inputs.environment }}-${{ inputs.app_name }}" >> $GITHUB_ENV

          # Set port based on app if not provided
          if [ -z "${{ inputs.port }}" ]; then
            case "${{ inputs.app_name }}" in
              auth) echo "APP_PORT=8090" >> $GITHUB_ENV ;;
              artemis) echo "APP_PORT=8080" >> $GITHUB_ENV ;;
              workout-planner) echo "APP_PORT=8000" >> $GITHUB_ENV ;;
              meal-planner) echo "APP_PORT=8010" >> $GITHUB_ENV ;;
              home-manager) echo "APP_PORT=8020" >> $GITHUB_ENV ;;
              vehicle-manager) echo "APP_PORT=8030" >> $GITHUB_ENV ;;
              work-planner) echo "APP_PORT=8040" >> $GITHUB_ENV ;;
              education-planner) echo "APP_PORT=8050" >> $GITHUB_ENV ;;
              content-planner) echo "APP_PORT=8060" >> $GITHUB_ENV ;;
            esac
          else
            echo "APP_PORT=${{ inputs.port }}" >> $GITHUB_ENV
          fi

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names $ECR_REPOSITORY --region $AWS_REGION >/dev/null 2>&1 || \
          aws ecr create-repository \
            --repository-name $ECR_REPOSITORY \
            --image-scanning-configuration scanOnPush=true \
            --region $AWS_REGION

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        working-directory: services-repo
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f ${{ inputs.app_name }}/Dockerfile \
            --build-arg ENVIRONMENT=${{ inputs.environment }} \
            --build-arg PORT=$APP_PORT \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:${{ inputs.environment }}

      - name: Push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ inputs.environment }}

      - name: Get secrets ARNs
        id: secrets
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "database_url_arn=arn:aws:secretsmanager:$AWS_REGION:$ACCOUNT_ID:secret:${{ inputs.environment }}/${{ inputs.app_name }}/database_url" >> $GITHUB_OUTPUT
          echo "jwt_secret_arn=arn:aws:secretsmanager:$AWS_REGION:$ACCOUNT_ID:secret:${{ inputs.environment }}/${{ inputs.app_name }}/jwt_secret" >> $GITHUB_OUTPUT

      - name: Create/Update ECS task definition
        id: task-def
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

          # Generate task definition
          cat > /tmp/task-def.json << EOF
          {
            "family": "${{ inputs.environment }}-${{ inputs.app_name }}",
            "networkMode": "awsvpc",
            "requiresCompatibilities": ["FARGATE"],
            "cpu": "${{ inputs.environment == 'production' && '512' || '256' }}",
            "memory": "${{ inputs.environment == 'production' && '1024' || '512' }}",
            "executionRoleArn": "arn:aws:iam::$ACCOUNT_ID:role/${{ inputs.environment }}-ecs-task-execution-role",
            "taskRoleArn": "arn:aws:iam::$ACCOUNT_ID:role/${{ inputs.environment }}-ecs-task-role",
            "containerDefinitions": [
              {
                "name": "$CONTAINER_NAME",
                "image": "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG",
                "essential": true,
                "portMappings": [
                  {
                    "containerPort": $APP_PORT,
                    "protocol": "tcp"
                  }
                ],
                "environment": [
                  {"name": "PORT", "value": "$APP_PORT"},
                  {"name": "ENVIRONMENT", "value": "${{ inputs.environment }}"},
                  {"name": "LOG_LEVEL", "value": "${{ inputs.environment == 'production' && 'info' || 'debug' }}"},
                  {"name": "APP_NAME", "value": "${{ inputs.app_name }}"}
                ],
                "secrets": [
                  {
                    "name": "DATABASE_URL",
                    "valueFrom": "${{ steps.secrets.outputs.database_url_arn }}"
                  }
                ],
                "logConfiguration": {
                  "logDriver": "awslogs",
                  "options": {
                    "awslogs-group": "/ecs/${{ inputs.environment }}-${{ inputs.app_name }}",
                    "awslogs-region": "$AWS_REGION",
                    "awslogs-stream-prefix": "ecs",
                    "awslogs-create-group": "true"
                  }
                },
                "healthCheck": {
                  "command": ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:$APP_PORT/health')\" || exit 1"],
                  "interval": 30,
                  "timeout": 5,
                  "retries": 3,
                  "startPeriod": 60
                }
              }
            ]
          }
          EOF

          # Register task definition
          aws ecs register-task-definition \
            --cli-input-json file:///tmp/task-def.json \
            --region $AWS_REGION

      - name: Deploy to ECS
        run: |
          # Check if service exists
          SERVICE_EXISTS=$(aws ecs describe-services \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --region $AWS_REGION \
            --query 'services[0].status' \
            --output text 2>/dev/null || echo "")

          if [ "$SERVICE_EXISTS" == "ACTIVE" ]; then
            echo "Service exists, updating..."
            aws ecs update-service \
              --cluster $ECS_CLUSTER \
              --service $ECS_SERVICE \
              --task-definition ${{ inputs.environment }}-${{ inputs.app_name }} \
              --force-new-deployment \
              --region $AWS_REGION

            echo "Waiting for service to stabilize..."
            aws ecs wait services-stable \
              --cluster $ECS_CLUSTER \
              --services $ECS_SERVICE \
              --region $AWS_REGION
          else
            echo "::warning::ECS service does not exist yet. Run Terraform to create infrastructure first."
            exit 1
          fi

      - name: Deployment Success
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          echo "============================================================"
          echo "  ${{ inputs.app_name }} DEPLOYED TO ${{ inputs.environment }}"
          echo "============================================================"
          echo ""
          echo "Image: $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}"
          echo "Service: $ECS_SERVICE"
          echo "Cluster: $ECS_CLUSTER"
          echo ""
          echo "View logs:"
          echo "   aws logs tail /ecs/${{ inputs.environment }}-${{ inputs.app_name }} --follow --region $AWS_REGION"
          echo ""
          echo "Check service status:"
          echo "   aws ecs describe-services --cluster $ECS_CLUSTER --services $ECS_SERVICE --region $AWS_REGION"
